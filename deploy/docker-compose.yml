services:
  alert-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.alert-api
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      - PORT=3200
      - DB_PATH=/data/alerts.db
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
    volumes:
      - alert-data:/data

  alert-daemon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.alert-daemon
    restart: unless-stopped
    environment:
      - DB_PATH=/data/alerts.db
      - CHECK_INTERVAL_MS=60000
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
    volumes:
      - alert-data:/data
    depends_on:
      - alert-api

volumes:
  alert-data:
